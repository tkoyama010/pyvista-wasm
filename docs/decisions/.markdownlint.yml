default: true

# Allow arbitrary line length
#
# Reason: We apply the one-sentence-per-line rule. A sentence may get longer than 80 characters, especially if links are contained.
#
# Details: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md#md013---line-length
MD013: false

# Allow duplicate headings
#
# Reasons:
#
# - The chosen option is considerably often used as title of the ADR (e.g., ADR-0015). Thus, that title repeats.
# - We use "Examples" multiple times (e.g., ADR-0010).
# - Markdown lint should support the user and not annoy them.
#
# Details: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md#md024---multiple-headings-with-the-same-content
MD024: false

# Allow first line to be front matter instead of a heading
#
# Reason: MADR records use YAML front matter (---) for metadata. The bundled
# markdownlint-cli2 in the GitHub Action does not always recognise front matter
# the same way the CLI does, so MD041 fires on the opening "---".
#
# Details: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md#md041---first-line-in-a-file-should-be-a-top-level-heading
MD041: false

# Allow trailing punctuation in headings
#
# Reason: Template placeholders such as "{decision driver 1, e.g., a force, …}"
# and YAML keys ("status:", "date:") end with punctuation.  Forcing authors to
# reword every placeholder would make the template harder to use.
#
# Details: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md#md026---trailing-punctuation-in-heading
MD026: false
