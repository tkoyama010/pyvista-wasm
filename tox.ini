[tox]
# SPEC 0: Only test Python versions within 36-month support window
envlist = py{312,313,314},lint
isolated_build = True

[testenv]
deps =
    pytest>=7.0
    pytest-cov
    playwright>=1.40
    pytest-playwright>=0.4.0
    pillow>=9.0
commands_pre =
    playwright install chromium
commands =
    pytest tests/ src/ --cov=pyvista_wasm --cov-report=xml --cov-report=term {posargs}

[testenv:lint]
deps =
    ruff>=0.1.0
    mypy>=1.0.0
    numpy>=2.0
commands_pre =
commands =
    ruff check .
    ruff format --check .
    mypy src/
