name: Documentation
description: Report a documentation issue or suggest an improvement
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping us improve the documentation!
  - type: dropdown
    id: type
    attributes:
      label: Documentation Type
      options:
        - Tutorial
        - How-To Guide
        - Explanation
        - Reference
        - API Documentation
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Documentation Location
      description: URL or file path of the documentation in question.
      placeholder: "https://github.com/tkoyama010/pyvista-wasm/..."
  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: Describe the documentation issue.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?
  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the [Code of Conduct](https://github.com/tkoyama010/pyvista-wasm/blob/main/CODE_OF_CONDUCT.md)
          required: true
