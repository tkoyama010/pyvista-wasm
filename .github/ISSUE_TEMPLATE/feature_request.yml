name: Feature Request
description: Suggest a new feature or enhancement for pyvista-wasm
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the form below.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: A clear description of the problem this feature would solve.
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear description of what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
  - type: textarea
    id: example
    attributes:
      label: Example Usage
      description: How you envision using this feature.
      render: python
      placeholder: |
        import pyvista_wasm as pv

        # Example of how the new feature would be used
  - type: textarea
    id: pyvista
    attributes:
      label: PyVista Comparison
      description: If this feature exists in PyVista, please link to the relevant documentation.
      placeholder: "https://docs.pyvista.org/..."
  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the [Code of Conduct](https://github.com/tkoyama010/pyvista-wasm/blob/main/CODE_OF_CONDUCT.md)
          required: true
