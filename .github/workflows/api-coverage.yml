name: API Coverage Badge

on:
  push:
    branches: [main]

permissions: {}

jobs:
  badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: false

      - name: Install dependencies
        run: uv pip install --system pyvista "pyvista-wasm[dev]"

      - name: Generate coverage badge
        run: pyvista-wasm api-coverage --output badges/coverage.json

      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update API coverage badge [skip ci]"
            git push
          fi
