# SPEC 4 — Using and Creating Nightly Wheels
# https://scientific-python.org/specs/spec-0004/
name: Nightly Tests

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
      with:
        enable-cache: false

    - name: Install nightly dependencies
      run: |
        uv pip install --system --pre \
          --index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple \
          --extra-index-url https://pypi.org/simple \
          numpy
        uv pip install --system ".[dev]"

    - name: Run tests
      run: |
        uv run pytest -m "not playwright" --cov=pyvista_wasm --cov-report=xml -x

    - name: Create issue on failure
      if: failure()
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v7
      with:
        script: |
          const title = `Nightly test failure (Python ${{ matrix.python-version }})`;
          const body = `Nightly tests failed for Python ${{ matrix.python-version }}.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const labels = ['nightly'];

          // Check for existing open issue to avoid duplicates
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: labels.join(','),
            state: 'open',
          });

          const existing = issues.data.find(i => i.title === title);
          if (!existing) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });
          }
