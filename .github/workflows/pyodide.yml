name: Pyodide Tests

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build wheel for Pyodide
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version: '3.12'  # Same version as used in Pyodide

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyodide-build>=0.27.0

    - name: Build Pyodide wheel
      run: |
        # Build the wheel for Pyodide (Emscripten/WebAssembly target)
        pyodide build

    - name: Upload wheel artifact
      uses: actions/upload-artifact@4.6.2
      with:
        name: pyodide-wheel
        path: dist/*.whl
        if-no-files-found: error

  # Run tests using pytest-pyodide reusable workflow
  test-pyodide:
    needs: build
    uses: pyodide/pytest-pyodide/.github/workflows/main.yaml@main
    with:
      build-artifact-name: pyodide-wheel
      build-artifact-path: dist
      browser: chrome
      runner: playwright
      pyodide-version: 0.27.2
      test-arguments: tests/test_pyodide.py -v
