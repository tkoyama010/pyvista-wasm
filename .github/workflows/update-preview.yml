name: Update Preview GIF
on:
  workflow_dispatch:

permissions: {}

jobs:
  update-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "22"
      - run: |
          pip install . playwright "imageio[ffmpeg]" pillow
          playwright install chromium
      - name: Verify JupyterLite site is accessible
        run: |
          curl -sSf https://tkoyama010.github.io/pyvista-wasm/lab/ > /dev/null || {
            echo "Error: JupyterLite site is not accessible at https://tkoyama010.github.io/pyvista-wasm/"
            echo "Please ensure GitHub Pages is enabled and the site has been deployed from the main branch."
            exit 1
          }
          echo "JupyterLite site is accessible, proceeding with capture..."
      - run: python -m pyvista_wasm capture-preview --rotate
      - name: Upload preview GIF to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --json tagName -q .tagName)
          gh release upload "$TAG" assets/preview.gif --clobber
