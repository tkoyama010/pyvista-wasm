name: Update Preview GIF
on:
  workflow_dispatch:

permissions: {}

jobs:
  update-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
      - run: |
          pip install . playwright "imageio[ffmpeg]" pillow
          playwright install chromium
      - name: Verify JupyterLite site is accessible
        run: |
          curl -sSf https://pyvista-js.readthedocs.io/en/latest/lite/lab/index.html > /dev/null || {
            echo "Error: JupyterLite site is not accessible at https://pyvista-js.readthedocs.io/en/latest/lite/lab/index.html"
            echo "Please ensure ReadTheDocs is configured and the site has been deployed."
            exit 1
          }
          echo "JupyterLite site is accessible, proceeding with capture..."
      - run: python -m pyvista_wasm capture-preview --rotate
      - name: Upload preview GIF to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --json tagName -q .tagName)
          gh release upload "$TAG" assets/preview.gif --clobber
