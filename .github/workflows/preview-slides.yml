name: Preview Slides on Pull Request

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    paths:
      - 'slides/**'

permissions:
  contents: write
  pull-requests: write

concurrency: preview-slides-${{ github.ref }}

jobs:
  preview-slides:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - name: Install Slidev dependencies
        if: github.event.action != 'closed'
        working-directory: slides
        run: npm ci

      - name: Build Slidev deck
        if: github.event.action != 'closed'
        working-directory: slides
        run: npx slidev build --base /pyvista-wasm/pr-preview/pr-${{ github.event.number }}/

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9  # v1.8.1
        with:
          source-dir: slides/dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
