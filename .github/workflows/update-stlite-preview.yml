name: Update stlite Preview GIF
on:
  workflow_dispatch:

permissions: {}

jobs:
  update-stlite-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
      - run: |
          pip install . playwright "imageio[ffmpeg]" pillow
          playwright install chromium
      - run: python -m pyvista_wasm capture-stlite-preview
      - name: Upload stlite preview GIF to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --json tagName -q .tagName)
          gh release upload "$TAG" assets/stlite-preview.gif --clobber
