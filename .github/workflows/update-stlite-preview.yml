name: Update stlite Preview GIF
on:
  workflow_dispatch:

permissions: {}

jobs:
  update-stlite-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
      - run: |
          pip install . playwright "imageio[ffmpeg]" pillow
          playwright install chromium
      - run: python -m pyvista_wasm capture-stlite-preview
      - name: Upload stlite preview GIF to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --json tagName -q .tagName)
          gh release upload "$TAG" assets/stlite-preview.gif --clobber
