name: Update stlite Preview GIF
on:
  workflow_dispatch:

permissions: {}

jobs:
  update-stlite-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
      - run: |
          pip install . playwright "imageio[ffmpeg]" pillow
          playwright install chromium
      - run: python -m pyvista_wasm capture-stlite-preview
      - name: Upload stlite preview GIF to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --json tagName -q .tagName)
          gh release upload "$TAG" assets/stlite-preview.gif --clobber
