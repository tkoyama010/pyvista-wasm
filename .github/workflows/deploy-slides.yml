name: Deploy Slides to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'slides/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-slides-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-slides:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - name: Install Slidev dependencies
        working-directory: slides
        run: npm ci

      - name: Build Slidev deck
        working-directory: slides
        run: npx slidev build --base /pyvista-wasm/slides/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: slides/dist
          destination_dir: slides
          keep_files: true
