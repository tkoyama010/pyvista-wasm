name: Deploy JupyterLite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - closed
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: pages
  cancel-in-progress: false

permissions: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22'

      - name: Install JupyterLite
        run: |
          python -m pip install --upgrade pip
          pip install jupyterlite-core jupyterlite-pyodide-kernel jupyter-server jupytext

      - name: Sync Jupytext files
        run: |
          jupytext --sync jupyterlite/content/*.py

      - name: Copy source code to JupyterLite
        run: |
          mkdir -p jupyterlite/content/src
          cp -r src/pyvista_wasm jupyterlite/content/src/

      - name: Build JupyterLite
        run: |
          jupyter lite build --contents jupyterlite/content --output-dir _site

      - name: Create stlite redirect page
        run: |
          mkdir -p _site/stlite
          cat > _site/stlite/index.html << 'STLITE_EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=https://edit.share.stlite.net/#!" />
              <title>Redirecting...</title>
            </head>
            <body>
              <p>Redirecting to stlite demo...</p>
            </body>
          </html>
          STLITE_EOF

      - name: Deploy to gh-pages (main branch)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e  # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: .
          keep_files: true

      - name: Deploy PR Preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9  # v1
        with:
          source-dir: _site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
